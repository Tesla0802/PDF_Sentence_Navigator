<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>PDF Sentence Navigator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>PDF Sentence Navigator</h1>
  <p>
    ბრაუზერში PDF ბმულს რომ ხსნი, ეს extension ავტომატურად გახსნის მას საკუთარ
    viewer-ში, სადაც <code>TAB</code> და <code>SHIFT+TAB</code> გადაგადგილებს
    წინადადებებზე.
  </p>
  <p>
    ლოკალური ფაილის ასარჩევად, დააჭირე ღილაკს — ახალ tab-ში გაიხსნება viewer,
    სადაც ფაილის არჩევა შეგეძლება.
  </p>
  <button id="openBtn">Viewer-ის გახსნა</button>
  <script src="popup.js"></script>
</body>
</html>
